<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Dark background -->
  <rect width="64" height="64" rx="15" fill="#080c14"/>

  <!-- Outer ear arc (D-shape, opening to the left) -->
  <path d="M 28 10 Q 57 10 57 32 Q 57 54 28 54"
        stroke="url(#g1)" stroke-width="4" stroke-linecap="round"/>

  <!-- Inner helix arc -->
  <path d="M 28 21 Q 46 21 46 32 Q 46 43 28 43"
        stroke="url(#g2)" stroke-width="2.2" stroke-linecap="round" opacity="0.65"/>

  <!-- 译 character -->
  <text x="17" y="41" text-anchor="middle" font-size="21" font-weight="700"
        fill="white"
        font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif">译</text>

  <defs>
    <linearGradient id="g1" x1="28" y1="10" x2="57" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="g2" x1="28" y1="21" x2="46" y2="43" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>
</svg>
